name: Test

on:
  push:
    branches: [main, opus]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Create frontend dist placeholder
        run: |
          mkdir -p internal/frontend/dist
          echo '<html><body>placeholder</body></html>' > internal/frontend/dist/index.html

      - name: Download Go modules
        run: go mod download

      - name: Run Go vet
        run: go vet ./...

      - name: Run Go tests with race detector
        run: go test ./... -v -count=1 -race

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Lint
        run: npm run lint

  build:
    name: Full Build
    runs-on: ubuntu-latest
    needs: [go-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist for embedding
        run: |
          rm -rf internal/frontend/dist
          cp -r frontend/dist internal/frontend/dist

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -o bin/clabnoc ./cmd/clabnoc

      - name: Verify binary
        run: ./bin/clabnoc --version
