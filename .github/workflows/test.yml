name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build frontend placeholder
        run: |
          mkdir -p internal/frontend/dist
          echo '<!DOCTYPE html><html><head><title>clabnoc</title></head><body></body></html>' > internal/frontend/dist/index.html

      - name: Download Go modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Run Go tests (with race detector)
        run: go test ./... -v -count=1 -race

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build:
    name: Full Build
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Copy dist to embed path
        run: cp -r frontend/dist internal/frontend/dist

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -o bin/clabnoc ./cmd/clabnoc

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: clabnoc-linux-amd64
          path: bin/clabnoc
          retention-days: 7
