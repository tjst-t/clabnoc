# clabnoc feature test topology
#
# Tests: project discovery, DC/rack grouping, node icons/roles,
#        exec/ssh terminal, noVNC proxy, link fault injection, netem,
#        node start/stop, real-time events
#
# Usage:
#   cd testlab
#   ./setup.sh          # create VM disk
#   sudo clab deploy -t clabnoc-test.clab.yml
#   sudo clab destroy -t clabnoc-test.clab.yml

name: clabnoc-test

topology:
  nodes:
    # ── Spine Switch (dc1/rack1) ──
    # Tests: srlinux kind → auto switch icon, spine role, exec terminal, SSH
    spine:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
      type: ixr-d2l
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 type bridged
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 type bridged
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 type bridged
        set / network-instance bridge type mac-vrf
        set / network-instance bridge admin-state enable
        set / network-instance bridge interface ethernet-1/1.0
        set / network-instance bridge interface ethernet-1/2.0
        set / network-instance bridge interface ethernet-1/3.0

    # ── Leaf Switch (dc1/rack2) ──
    # Tests: second rack grouping, leaf role
    leaf:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:latest
      type: ixr-d2l
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 type bridged
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 type bridged
        set / network-instance bridge type mac-vrf
        set / network-instance bridge admin-state enable
        set / network-instance bridge interface ethernet-1/1.0
        set / network-instance bridge interface ethernet-1/2.0

    # ── BMC Server (dc1/rack2) ──
    # Tests: qemu-bmc auto-detect → bmc icon, noVNC proxy access, VNC access method
    server01:
      kind: linux
      image: ghcr.io/tjst-t/qemu-bmc:latest
      binds:
        - vm-disks/server01.qcow2:/vm/disk.qcow2
      env:
        VM_MEMORY: 1024
        VM_CPUS: 1
        IPMI_USER: admin
        IPMI_PASS: password
        VM_NETWORKS: eth2
        POWER_ON_AT_START: "true"
      cap-add:
        - NET_ADMIN
        - SYS_ADMIN
      devices:
        - /dev/kvm:/dev/kvm
        - /dev/net/tun:/dev/net/tun

    # ── Client Host (dc1/rack1) ──
    # Tests: linux kind → host icon, exec terminal, node start/stop
    client:
      kind: linux
      image: alpine:latest
      exec:
        - apk add --no-cache iproute2

    # ── Hidden node ──
    # Tests: graph-hide label (should NOT appear in topology)
    infra:
      kind: linux
      image: alpine:latest
      labels:
        graph-hide: "yes"

  links:
    # Spine-Leaf uplink — test fault injection between racks
    - endpoints: ["spine:e1-1", "leaf:e1-1"]

    # Client to Spine — test netem (delay/loss)
    - endpoints: ["client:eth1", "spine:e1-2"]

    # Server to Leaf — test link down/up
    - endpoints: ["server01:eth1", "leaf:e1-2"]

    # Client to Spine (second link) — test multiple links per node
    - endpoints: ["client:eth2", "spine:e1-3"]
